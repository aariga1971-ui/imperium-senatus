<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>IMPERIUM SENATUS</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5EDD0;--sf:#FFFBF0;--sf2:#FDF5E0;
  --tx:#2C1800;--tx2:#7A4800;--tx3:#A87030;
  --gold:#7A4800;--glt:#5C3200;--gmd:#9A6000;--gdk:#3A1800;
  --cr:#B82010;--b:rgba(122,72,0,.18);--b2:rgba(122,72,0,.35);
}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:'Cinzel',serif;}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;z-index:-1;
  background:radial-gradient(ellipse at 20% 20%,#EDE0B0 0%,#EEE5C0 40%,#F5EDD0 100%);}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--gmd);border-radius:3px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes flipIn{from{opacity:0;transform:rotateY(60deg) scale(.9)}to{opacity:1;transform:rotateY(0) scale(1)}}
@keyframes pulseA{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes glowA{0%,100%{box-shadow:0 0 8px rgba(201,168,76,.3)}50%{box-shadow:0 0 22px rgba(201,168,76,.7)}}
@keyframes riseA{from{opacity:0;transform:translateY(18px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes slamA{0%{opacity:0;transform:scale(1.2) translateY(-15px)}60%{transform:scale(.99)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes shimmerA{0%{left:-80%}100%{left:120%}}
@keyframes bloodA{0%{transform:scaleY(0);opacity:0}20%{transform:scaleY(1);opacity:1}80%{opacity:1}100%{transform:translateY(50px);opacity:0}}
@keyframes fireA{0%{transform:scale(0);opacity:0}40%{transform:scale(1.2);opacity:1}100%{transform:scale(2);opacity:0}}
@keyframes resurrectA{0%{opacity:0;transform:scale(.5)}40%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
.fu{animation:fadeUp .35s ease both;}
.fl{animation:flipIn .4s ease both;}
.riseA{animation:riseA .35s ease both;}
.slamA{animation:slamA .4s cubic-bezier(.2,.8,.3,1) both;}
.glowA{animation:glowA 2.5s infinite;}
.pulseA{animation:pulseA .9s infinite;}
.tag{display:inline-block;font-size:7px;font-family:'Cinzel',serif;letter-spacing:.7px;padding:2px 5px;border-radius:2px;font-weight:600;text-transform:uppercase;}
.t-mil{background:rgba(196,43,21,.25);color:#FF8080;border:.5px solid rgba(196,43,21,.6);}
.t-gov{background:rgba(201,168,76,.2);color:#E8C97A;border:.5px solid rgba(201,168,76,.5);}
.t-int{background:rgba(139,92,246,.2);color:#C4B5FD;border:.5px solid rgba(139,92,246,.5);}
.t-san{background:rgba(45,158,107,.2);color:#6EE7B7;border:.5px solid rgba(45,158,107,.5);}
.t-ter{background:rgba(59,130,246,.2);color:#93C5FD;border:.5px solid rgba(59,130,246,.5);}
.rL{background:#5C3200;color:#FFE066;border:.5px solid var(--gmd);font-size:7px;}
.rE{background:#2E0764;color:#DDD6FE;border:.5px solid #8B5CF6;font-size:7px;}
.rR{background:#0C2460;color:#BAD4FF;border:.5px solid #3B82F6;font-size:7px;}
.rC{background:#252525;color:#D4D4D4;border:.5px solid #666;font-size:7px;}
.era{font-size:8px;letter-spacing:1.5px;padding:2px 9px;border-radius:2px;font-family:'Cinzel',serif;font-weight:600;text-transform:uppercase;}
.era-JC{background:rgba(201,168,76,.15);color:#E8C97A;border:.5px solid rgba(201,168,76,.4);}
.era-FJ{background:rgba(59,130,246,.15);color:#93C5FD;border:.5px solid rgba(59,130,246,.4);}
.era-NA{background:rgba(45,158,107,.15);color:#6EE7B7;border:.5px solid rgba(45,158,107,.4);}
.era-SE{background:rgba(139,92,246,.15);color:#C4B5FD;border:.5px solid rgba(139,92,246,.4);}
.era-MI{background:rgba(196,43,21,.15);color:#FCA5A5;border:.5px solid rgba(196,43,21,.4);}
.era-CO{background:rgba(45,107,92,.15);color:#6EE7B7;border:.5px solid rgba(45,107,92,.4);}
.era-LA{background:rgba(180,83,9,.15);color:#FCD34D;border:.5px solid rgba(180,83,9,.4);}
.panel{background:var(--sf);border:1px solid var(--b2);border-radius:10px;padding:12px 14px;margin-bottom:8px;position:relative;box-shadow:0 2px 10px rgba(122,72,0,.1);}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gmd),transparent);opacity:.4;}
.pill{font-size:10px;padding:3px 9px;border-radius:10px;font-family:'Cinzel',serif;font-weight:600;display:inline-block;}
.pg{background:rgba(201,168,76,.15);color:var(--glt);border:.5px solid var(--b2);}
.pb{background:rgba(59,130,246,.15);color:#93C5FD;border:.5px solid rgba(59,130,246,.4);}
.pr{background:rgba(196,43,21,.15);color:#FCA5A5;border:.5px solid rgba(196,43,21,.4);}
.pgr{background:rgba(45,158,107,.15);color:#6EE7B7;border:.5px solid rgba(45,158,107,.4);}
.ec{border-radius:10px;border:1.5px solid var(--b2);background:var(--sf);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.12);transition:transform .2s,box-shadow .2s;position:relative;}
.ec.click{cursor:pointer;}
.ec.click:hover{transform:translateY(-8px);box-shadow:0 14px 30px rgba(0,0,0,.6),0 0 0 1px var(--gold);}
.ec.mine{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 0 16px rgba(201,168,76,.25);}
.ec.dead{opacity:.25;filter:grayscale(1);}
.shine{position:absolute;top:0;left:-80%;width:60%;height:100%;background:linear-gradient(105deg,transparent 30%,rgba(255,215,100,.2) 50%,transparent 70%);animation:shimmerA 3.5s 1s infinite;pointer-events:none;}
.ac{border-radius:10px;border:1.5px solid var(--b2);background:var(--sf);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:transform .2s,box-shadow .2s;cursor:pointer;position:relative;animation:riseA .35s ease both;}
.ac:hover{transform:translateY(-8px) rotate(-1deg);box-shadow:0 14px 28px rgba(0,0,0,.55),0 0 0 1px var(--gold);}
.ac.sel{transform:translateY(-10px);border:2px solid var(--glt);box-shadow:0 18px 36px rgba(0,0,0,.6),0 0 0 2px var(--gold),0 0 24px rgba(201,168,76,.3);}
.ac.used{opacity:.25;filter:grayscale(1);pointer-events:none;transform:none;}
.ac-mil{border-top:3px solid #C42B15;}
.ac-gov{border-top:3px solid var(--gmd);}
.ac-int{border-top:3px solid #8B5CF6;}
.ac-san{border-top:3px solid #2D9E6B;}
.ac-special{border-top:3px solid var(--glt);}
.prow{background:var(--sf);border:1.5px solid var(--b2);border-radius:10px;padding:9px 11px;transition:all .2s;flex:1 1 125px;}
.prow.act{border-color:var(--gold);background:var(--sf2);animation:glowA 2.5s infinite;}
.prow.dead{opacity:.3;filter:grayscale(1);}
.swrap{background:rgba(0,0,0,.12);border-radius:3px;height:6px;overflow:hidden;flex:1;border:.5px solid var(--b);}
.sbar{height:100%;border-radius:3px;transition:width .55s ease;}
.logbox{background:var(--sf2);border:1px solid var(--b2);border-radius:8px;padding:8px 12px;max-height:110px;overflow-y:auto;font-family:'IM Fell English',serif;font-size:12px;line-height:1.9;}
.lp{color:#1A6B20;}.lcr{color:#A82010;font-style:italic;}
.lev{color:#5020A0;font-style:italic;}.lsy{color:#7A4800;}
.lai{color:#8A7050;font-style:italic;}.ldth{color:#A82010;font-weight:600;}
.ev{border-radius:10px;padding:11px 14px;margin-bottom:7px;position:relative;overflow:hidden;animation:slamA .4s cubic-bezier(.2,.8,.3,1) both;}
.ev::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.ev-crisis{background:#FFF0EE;border:1.5px solid rgba(184,32,16,.5);}.ev-crisis::before{background:linear-gradient(90deg,#B82010,#DC3020,#B82010);}
.ev-boon{background:#F0FBF4;border:1.5px solid rgba(30,140,80,.5);}.ev-boon::before{background:linear-gradient(90deg,#1A7040,#28A860,#1A7040);}
.ev-political{background:#F0F4FC;border:1.5px solid rgba(42,80,180,.4);}.ev-political::before{background:linear-gradient(90deg,#1A3A8A,#3060C0,#1A3A8A);}
.ev-assassination{background:#FFF0F4;border:1.5px solid rgba(180,20,50,.5);}.ev-assassination::before{background:linear-gradient(90deg,#A01030,#C8203A,#A01030);}
.btn{background:linear-gradient(135deg,#5C3800,#7A5010);color:#FFF8EE;border:1px solid #9A6820;padding:8px 20px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.18em;cursor:pointer;border-radius:5px;transition:all .2s;text-transform:uppercase;}
.btn:hover{background:linear-gradient(135deg,#7A5010,#9A6820);box-shadow:0 4px 12px rgba(122,80,16,.3);transform:translateY(-1px);}
.btn:active{transform:scale(.97);}.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.btn-sm{padding:5px 12px;font-size:10px;letter-spacing:.12em;}
.btn-gh{background:transparent;color:var(--tx2);border:1px solid var(--b2);padding:6px 14px;font-family:'Cinzel',serif;font-size:11px;cursor:pointer;border-radius:5px;transition:all .2s;text-transform:uppercase;letter-spacing:.12em;}
.btn-gh:hover{border-color:var(--gmd);color:var(--glt);background:rgba(0,0,0,.06);}
.btn-red{background:linear-gradient(135deg,#5C0C08,#8B1A0A);color:#FFB0A8;border-color:rgba(196,43,21,.6);}
.btn-red:hover{background:linear-gradient(135deg,#8B1A0A,#C42B15);}
.btn-blue{background:linear-gradient(135deg,#0C2460,#1B3A8A);color:#93C5FD;border-color:rgba(59,100,180,.5);}
.btn-blue:hover{background:linear-gradient(135deg,#1B3A8A,#2952B8);}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
.cbar{background:linear-gradient(135deg,rgba(74,56,16,.95),rgba(50,38,10,.98));border:1px solid var(--b2);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.catgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:8px;}
.handwrap{display:flex;gap:9px;flex-wrap:wrap;padding:6px 0 10px;}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ─── React helpers ───
var h = React.createElement;
var useState = React.useState;
var useRef = React.useRef;
var useEffect = React.useEffect;
var useCallback = React.useCallback;

// ─── Utilities ───
var cl = function(v,lo,hi){lo=lo===undefined?0:lo;hi=hi===undefined?100:hi;return Math.max(lo,Math.min(hi,v));};
var rnd = Math.round;
var shuf = function(a){return a.slice().sort(function(){return Math.random()-.5;});};
var P_COLORS = ['#60A5FA','#F87171','#86EFAC','#C4B5FD','#FCD34D'];
var ERA_ORDER = ['JC','FJ','NA','SE','MI','CO','LA'];

// ─── ACTION CARDS ───
var ACTION_CARDS = [
  {id:'conquest',  type:'mil', icon:'⚔', name:'征服遠征',    cost:6, effect:'領土+2。最低領土の相手から領土奪取。',
   fn:function(ps,me,st,log){me.ter=Math.min(20,me.ter+2);var alive=ps.filter(function(p){return p.alive&&p!==me;});if(alive.length){var t=alive.reduce(function(a,b){return b.ter<a.ter?b:a;});t.ter=Math.max(1,t.ter-1);me.ter=Math.min(20,me.ter+1);}log('⚔ '+me.name+' 征服遠征 領土→'+me.ter,'lp');}},
  {id:'legion',    type:'mil', icon:'🛡', name:'軍団増強',    cost:4, effect:'次の暗殺防御+6。',
   fn:function(ps,me,st,log){me.fortified=true;me.legionBonus=true;log('🛡 '+me.name+' 軍団増強','lp');}},
  {id:'spy',       type:'mil', icon:'🕵', name:'スパイ工作',  cost:3, effect:'国庫最多から8奪う。',
   fn:function(ps,me,st,log){var alive=ps.filter(function(p){return p.alive&&p!==me;});if(!alive.length)return;var t=alive.reduce(function(a,b){return b.gold>a.gold?b:a;});var s=Math.min(8,t.gold);t.gold-=s;me.gold+=s;log('🕵 '+me.name+' スパイ工作 '+t.name+'から'+s+'奪取','lp');}},
  {id:'triumph2',  type:'mil', icon:'🏆', name:'凱旋式',      cost:5, effect:'武力×2の国庫。帝国耐久+3。',
   fn:function(ps,me,st,log){var g=me.emperor.mil*2;me.gold+=g;st.dur=cl(st.dur+3);log('🏆 '+me.name+' 凱旋式 国庫+'+g,'lp');}},
  {id:'traderoute',type:'gov', icon:'🐪', name:'交易路整備',  cost:3, effect:'領土×2の国庫収入。',
   fn:function(ps,me,st,log){var g=me.ter*2+Math.floor(me.emperor.int/2);me.gold+=g;log('🐪 '+me.name+' 交易路 国庫+'+g,'lp');}},
  {id:'colosseum', type:'gov', icon:'🏛', name:'コロッセウム建設',cost:8,effect:'内政×3の国庫。帝国耐久+5。',
   fn:function(ps,me,st,log){var g=me.emperor.gov*3;me.gold+=g;st.dur=cl(st.dur+5);me.buildBonus=(me.buildBonus||0)+3;log('🏛 '+me.name+' コロッセウム 国庫+'+g,'lp');}},
  {id:'grain',     type:'gov', icon:'🌾', name:'穀物供給',    cost:2, effect:'全員国庫+3。帝国耐久+2。',
   fn:function(ps,me,st,log){ps.forEach(function(p){if(p.alive)p.gold+=3;});me.gold+=me.emperor.gov;st.dur=cl(st.dur+2);log('🌾 '+me.name+' 穀物供給','lp');}},
  {id:'road',      type:'gov', icon:'🛤', name:'ローマ街道',  cost:4, effect:'領土+1。毎ターン収入+2。',
   fn:function(ps,me,st,log){me.ter=Math.min(20,me.ter+1);me.roadBonus=(me.roadBonus||0)+2;log('🛤 '+me.name+' 街道建設 領土→'+me.ter,'lp');}},
  {id:'philosophy',type:'int', icon:'📜', name:'哲学研究',    cost:2, effect:'知性×2の国庫。政変免疫。',
   fn:function(ps,me,st,log){var g=me.emperor.int*2;me.gold+=g;me.coupImmune=true;log('📜 '+me.name+' 哲学研究 国庫+'+g,'lp');}},
  {id:'diplomacy', type:'int', icon:'🤝', name:'外交交渉',    cost:3, effect:'相手を選んで国庫の30%を交換。知性高いほど有利。',
   fn:function(ps,me,st,log,actions){if(actions&&actions.diplomacy)actions.diplomacy();}},
  {id:'oracle',    type:'int', icon:'🔮', name:'神託を聞く',  cost:0, effect:'次イベント効果2倍（危機無効）。',
   fn:function(ps,me,st,log){me.oracleBuff=true;log('🔮 '+me.name+' 神託 次イベント2倍','lev');}},
  {id:'library',   type:'int', icon:'📚', name:'図書館建設',  cost:5, effect:'知性×2の国庫。追加ドロー。',
   fn:function(ps,me,st,log){var g=me.emperor.int*2;me.gold+=g;me.drawExtra=(me.drawExtra||0)+1;log('📚 '+me.name+' 図書館 国庫+'+g,'lp');}},
  {id:'feast',     type:'san', icon:'🍷', name:'民衆への宴',  cost:4, effect:'帝国耐久+4。国庫+人望×2。',
   fn:function(ps,me,st,log){st.dur=cl(st.dur+4);var g=me.emperor.san*2;me.gold+=g;log('🍷 '+me.name+' 宴 帝国耐久+4 国庫+'+g,'lp');}},
  {id:'senatevote',type:'san', icon:'🏛', name:'元老院決議',  cost:3, effect:'人望順に国庫+8/+5/+3。',
   fn:function(ps,me,st,log){var alive=ps.filter(function(p){return p.alive;}).slice().sort(function(a,b){return b.emperor.san-a.emperor.san;});var r=[8,5,3];alive.forEach(function(p,i){if(i<3){p.gold+=r[i];log('🏛 '+p.name+' 元老院 国庫+'+r[i],'lp');}});st.dur=cl(st.dur+3);}},
  {id:'gladiator', type:'san', icon:'🦁', name:'剣闘士大会',  cost:3, effect:'武力最高に国庫+10。全員耐久+2。',
   fn:function(ps,me,st,log){var alive=ps.filter(function(p){return p.alive;});if(!alive.length)return;var mx=Math.max.apply(null,alive.map(function(p){return p.emperor.mil;}));alive.forEach(function(p){if(p.emperor.mil>=mx){p.gold+=10;log('🦁 '+p.name+' 剣闘士優勝 国庫+10','lp');}});st.dur=cl(st.dur+2);}},
  {id:'games',     type:'san', icon:'🎭', name:'競技大会',    cost:2, effect:'国庫+人望×2。他者収入-1。',
   fn:function(ps,me,st,log){var g=me.emperor.san*2;me.gold+=g;ps.forEach(function(p){if(p.alive&&p!==me)p.popDebuff=(p.popDebuff||0)+1;});log('🎭 '+me.name+' 競技大会 国庫+'+g,'lp');}},
  {id:'assplot',   type:'special',icon:'🗡',name:'暗殺計画',  cost:5, effect:'任意の相手を暗殺（武力判定）。',
   fn:function(ps,me,st,log,actions){if(actions&&actions.plotAssassin)actions.plotAssassin();}},
  {id:'bribe',     type:'special',icon:'💰',name:'賄賂工作',  cost:4, effect:'指定プレーヤーの次手番を強制静観。',
   fn:function(ps,me,st,log,actions){if(actions&&actions.bribe)actions.bribe();}},
  {id:'religion',  type:'special',icon:'⛪',name:'宗教宣言',  cost:6, effect:'キリスト教公認or多神教。帝国耐久+6。',
   fn:function(ps,me,st,log){var ch=Math.random()<0.5;ps.forEach(function(p){if(p.alive)p.gold=Math.max(0,p.gold+(ch?5:-3));});me.gold+=8;st.dur=cl(st.dur+6);log('⛪ '+me.name+' 宗教宣言（'+(ch?'キリスト教':'多神教')+'）耐久+6','lev');}},
  {id:'coupcard',  type:'special',icon:'👑',name:'宮廷クーデター',cost:7,effect:'指定プレーヤーの皇帝を強制交代。',
   fn:function(ps,me,st,log,actions){if(actions&&actions.forcedCoup)actions.forcedCoup();}},
];

// ─── EMPERORS ───
var EMP = [
  {id:'augustus',  era:'JC',eL:'ユリウス=クラウディウス朝',name:'アウグストゥス',  yr:'BC27-AD14',em:'👑',r:'L',rL:'伝説',   mil:4, gov:10,int:9, san:8, ter:8, ti:'初代皇帝',   ab:'パックス・ロマーナ',  ad:'毎ターン国庫+3。豊作・建築カード1.5倍。'},
  {id:'tiberius',  era:'JC',eL:'ユリウス=クラウディウス朝',name:'ティベリウス',    yr:'14-37',    em:'🗿',r:'R',rL:'希少',   mil:7, gov:6, int:7, san:3, ter:8, ti:'陰鬱な後継者',ab:'カプリ島の隠遁',  ad:'暗殺防御+4。毎ターン国庫-2。'},
  {id:'caligula',  era:'JC',eL:'ユリウス=クラウディウス朝',name:'カリグラ',        yr:'37-41',    em:'🐎',r:'R',rL:'希少',   mil:7, gov:2, int:3, san:1, ter:5, ti:'愛された怪帝',ab:'狂気の賭け',      ad:'収入フェーズに50%で×2、50%で半減。'},

// ─── GAME SCREEN ───
function GameScreen(props){
  var init=props.init, numP=props.numP, onEnd=props.onEnd;
  var MAX=12, HAND=3;

  var sp=useState(function(){return JSON.parse(JSON.stringify(init));}); var players=sp[0]; var setPlayers=sp[1];
  var sa=useState(function(){return buildActionDeck();}); var acDeck=sa[0];
  var sb=useState(0); var acIdx=sb[0]; var setAcIdx=sb[1];
  var sc=useState(function(){return shuf(EVENTS);}); var evDeck=sc[0];
  var sd=useState(0); var evIdx=sd[0]; var setEvIdx=sd[1];
  var se=useState(1); var turn=se[0]; var setTurn=se[1];
  var sf=useState(100); var dur=sf[0]; var setDur=sf[1];
  var sg=useState('event'); var phase=sg[0]; var setPhase=sg[1];
  var sh=useState(0); var activeIdx=sh[0]; var setActiveIdx=sh[1];
  var si=useState(null); var curEv=si[0]; var setCurEv=si[1];
  var sj=useState(null); var selCard=sj[0]; var setSelCard=sj[1];
  var sk=useState([{text:'🏛 元老院召集。BC27〜AD395、皇帝たちの国庫争いが始まる。',cls:'lsy'}]); var logs=sk[0]; var setLogs=sk[1];
  var sl=useState(''); var narr=sl[0]; var setNarr=sl[1];
  var sm=useState(false); var narrLoad=sm[0]; var setNarrLoad=sm[1];
  var sn=useState(false); var coupPending=sn[0]; var setCoupPending=sn[1];
  var so=useState(null); var assassinData=so[0]; var setAssassinData=so[1];
  var sq=useState(false); var poisonPending=sq[0]; var setPoisonPending=sq[1];
  var sr2=useState(null); var bribeTarget=sr2[0]; var setBribeTarget=sr2[1];
  var ss=useState(null); var forcedCoupTarget=ss[0]; var setForcedCoupTarget=ss[1];
  var st2=useState(null); var assassinScene=st2[0]; var setAssassinScene=st2[1];
  var su=useState([]); var resurrectQ=su[0]; var setResurrectQ=su[1];
  var sv=useState(false); var showEnd=sv[0]; var setShowEnd=sv[1];
  var sw=useState(''); var endReason=sw[0]; var setEndReason=sw[1];
  var sdip=useState(null); var diplomacyTarget=sdip[0]; var setDiplomacyTarget=sdip[1];

  var psRef=useRef(players); useEffect(function(){psRef.current=players;},[players]);
  var durRef=useRef(dur); useEffect(function(){durRef.current=dur;},[dur]);
  var acDeckRef=useRef(acDeck);
  var acIdxRef=useRef(acIdx); useEffect(function(){acIdxRef.current=acIdx;},[acIdx]);
  var aiRunning=useRef(false);

  var addLog=useCallback(function(t,c){setLogs(function(prev){return prev.concat([{text:t,cls:c||''}]).slice(-60);});},[]);

  function callAI(prompt){
    setNarrLoad(true);setNarr('');
    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:'あなたは古代ローマ専門の歴史家ナレーターです。与えられた状況を2〜3文の劇的な日本語ナレーション（ラテン語フレーズ1つ含む）にしてください。',
        messages:[{role:'user',content:prompt}]})
    }).then(function(r){return r.json();}).then(function(d){
      var t=d.content&&d.content.find(function(b){return b.type==='text';});
      setNarr(t?t.text:'');setNarrLoad(false);
    }).catch(function(){setNarr('歴史の記録が途絶えた——しかしローマは続く。');setNarrLoad(false);});
  }

  function checkCollapse(ps,d){
    if(d<=0){addLog('💀 帝国耐久ゼロ！ローマ滅亡——全員敗北。','ldth');setEndReason('collapse');setShowEnd(true);return true;}
    var active=ps.filter(function(p){return p.alive;});
    var resting=ps.filter(function(p){return !p.alive&&(p.skipTurns||0)>0;});
    if(active.length===0&&resting.length===0&&ps.length>1){addLog('👑 全プレーヤーが倒れた。','lsy');setEndReason('survivor');setShowEnd(true);return true;}
    return false;
  }

  function dealHand(startIdx){
    var hand=[];
    for(var i=0;i<HAND;i++){
      var src=acDeckRef.current[(startIdx+i)%acDeckRef.current.length];
      hand.push({id:src.id,type:src.type,icon:src.icon,name:src.name,cost:src.cost,effect:src.effect,used:false});
    }
    return hand;
  }

  var applyIncome=useCallback(function(ps){
    ps.forEach(function(p){
      if(!p.alive||(p.skipTurns&&p.skipTurns>0)){return;}
      if(p.senateBlock){p.senateBlock=false;return;}
      var inc=Math.max(1,Math.floor(p.ter*p.emperor.gov/5));
      var id=p.emperor.id;
      if(id==='augustus')inc+=3;if(id==='titus')inc+=Math.floor(p.emperor.san*.3);
      if(id==='claudius')inc+=2;if(id==='hadrian')inc+=2;if(id==='antoninus')inc+=4;
      if(id==='nerva')inc+=2;if(id==='vespasian')inc+=2;if(id==='claudius2')inc+=1;
      if(id==='diocletian')inc+=3;if(id==='valentinian')inc+=1;if(id==='valens')inc+=2;
      if(id==='gratian')inc+=2;if(id==='probus')inc+=1;
      if(id==='gallienus')inc+=Math.min(5,Math.floor((100-durRef.current)/20));
      if(id==='julian'){var a1=ps.filter(function(x){return x.alive;});var mxI=Math.max.apply(null,a1.map(function(x){return x.emperor.int;}));if(p.emperor.int>=mxI)inc+=2;}
      if(id==='trajan'){var a2=ps.filter(function(x){return x.alive;});var mxT=Math.max.apply(null,a2.map(function(x){return x.ter;}));if(p.ter>=mxT)inc+=5;}
      if(id==='marcus'){var a3=ps.filter(function(x){return x.alive;});var mxM=Math.max.apply(null,a3.map(function(x){return x.emperor.int;}));if(p.emperor.int>=mxM)inc+=3;}
      if(id==='theodosius'){var a4=ps.filter(function(x){return x.alive;});var mxS=Math.max.apply(null,a4.map(function(x){return x.emperor.san;}));if(p.emperor.san>=mxS)inc+=4;}
      if(id==='tiberius')inc-=2;if(id==='elagabalus')inc-=3;if(id==='vitellius')inc-=4;
      if(id==='valerian')inc-=1;if(id==='commodus')inc-=2;
      if(p.roadBonus)inc+=p.roadBonus;
      if(p.buildBonus){inc+=p.buildBonus;p.buildBonus=0;}
      if(p.popDebuff){inc-=p.popDebuff;p.popDebuff=0;}
      if(id==='caligula'){if(Math.random()<.5){p.gold*=2;addLog('🐎 '+p.name+' 狂気の賭け 大当たり！','lev');}else{p.gold=Math.max(0,Math.floor(p.gold/2));addLog('🐎 '+p.name+' 狂気の賭け 大外れ…','lcr');}}
      p.gold+=Math.max(0,inc);
      addLog('💰 '+p.name+'（'+p.emperor.name+'）収入+'+Math.max(0,inc)+' → 国庫'+rnd(p.gold),'lsy');
    });
    // skipTurns countdown
    ps.forEach(function(p){
      if(!p.alive&&(p.skipTurns||0)>0){
        p.skipTurns--;
        if(p.skipTurns===0){p._needsRes=true;}
        else{addLog('⏳ '+p.name+' 一時退場中（あと'+p.skipTurns+'ターン）','lai');}
      }
    });
  },[addLog]);

  var advanceAction=useCallback(function(ps){
    var next=activeIdx+1;
    while(next<ps.length&&!ps[next].alive)next++;
    if(next>=ps.length){
      var ps2=JSON.parse(JSON.stringify(ps));
      applyIncome(ps2);
      setPlayers(ps2);
      var newDur=cl(durRef.current-2);setDur(newDur);
      var newTurn=turn+1;
      addLog('📅 ターン'+newTurn+'開始。帝国耐久-2。','lsy');
      if(newTurn>MAX){setTimeout(function(){setEndReason('split');setShowEnd(true);},400);return;}
      if(checkCollapse(ps2,newDur))return;
      setTurn(newTurn);setCurEv(null);setSelCard(null);aiRunning.current=false;
      var needRes=ps2.filter(function(p){return p._needsRes;});
      if(needRes.length>0){
        setResurrectQ(needRes.map(function(p){return p.id;}));
        setPlayers(ps2);
      } else {
        setActiveIdx(0);setPlayers(ps2);
        setTimeout(function(){setPhase('event');},300);
      }
    } else {
      setActiveIdx(next);setSelCard(null);setPlayers(ps);
    }
  },[activeIdx,turn,applyIncome,addLog,checkCollapse]);

  // EVENT PHASE
  useEffect(function(){
    if(phase!=='event')return;
    var ps=JSON.parse(JSON.stringify(psRef.current));
    // 帝国耐久が低いほど危機イベントを引きやすくする
    var crisisDeck=EVENTS.filter(function(e){return e.type==='crisis';});
    var currentDur=durRef.current;
    var crisisChance=currentDur<30?0.6:currentDur<60?0.3:0;
    var ev;
    if(crisisChance>0&&Math.random()<crisisChance&&crisisDeck.length>0){
      ev=crisisDeck[Math.floor(Math.random()*crisisDeck.length)];
      addLog('⚠ 帝国の弱体化により危機が頻発している…（耐久'+rnd(currentDur)+'%）','lcr');
    }else{
      ev=evDeck[evIdx%evDeck.length];
    }
    setEvIdx(function(i){return i+1;});
    setCurEv(ev);
    var blocked=false;
    var st={dur:durRef.current};
    var acts={
      coup:function(){blocked=true;setCoupPending(true);},
      assassin:function(){blocked=true;var byIdx=ps.findIndex(function(p){return p.alive;});if(byIdx>=0)setAssassinData({byIdx:byIdx,fromCard:false});},
      poison:function(){blocked=true;setPoisonPending(true);},
    };
    ev.fn(ps,st,addLog,acts);
    var newDur=cl(st.dur);setDur(newDur);
    var dealIdx=acIdxRef.current;
    ps.forEach(function(p){if(p.alive){p.hand=dealHand(dealIdx);dealIdx+=HAND;}});
    setAcIdx(dealIdx);setPlayers(ps);
    callAI('ターン'+turn+'にイベント「'+ev.name+'」発生。'+ev.eff+'。帝国耐久'+rnd(newDur)+'%。ナレーションせよ。');
    if(!blocked){if(!checkCollapse(ps,newDur))setTimeout(function(){setActiveIdx(0);setPhase('action');},2400);}
  },[phase]); // eslint-disable-line

  // AI AUTO PLAY
  useEffect(function(){
    if(phase!=='action')return;
    var p=psRef.current[activeIdx];
    if(!p||!p.alive||p.isHuman)return;
    if(aiRunning.current)return;
    aiRunning.current=true;
    var timer=setTimeout(function(){
      var ps=JSON.parse(JSON.stringify(psRef.current));
      var me=ps[activeIdx];
      if(me.bribed){me.bribed=false;addLog('💰 '+me.name+' 賄賂により静観を強制された','lev');setPlayers(ps);aiRunning.current=false;advanceAction(ps);return;}
      var hand=me.hand||[];
      var affordable=hand.filter(function(c){return !c.used&&c.id!=='__used'&&me.gold>=c.cost;});
      if(!affordable.length){addLog('— '+me.name+'（AI）手札コスト不足 静観','lai');aiRunning.current=false;advanceAction(ps);return;}
      var chosen=affordable.reduce(function(best,c){
        var sc=c.type==='mil'?me.emperor.mil*2:c.type==='gov'?me.emperor.gov*2:c.type==='int'?me.emperor.int*2:c.type==='san'?me.emperor.san*2:5;
        var bs=best.type==='mil'?me.emperor.mil*2:best.type==='gov'?me.emperor.gov*2:best.type==='int'?me.emperor.int*2:best.type==='san'?me.emperor.san*2:5;
        return sc>bs?c:best;
      },affordable[0]);
      var chosenIdx=hand.indexOf(chosen);
      me.gold=Math.max(0,me.gold-chosen.cost);
      var st={dur:durRef.current};
      var mc=ACTION_CARDS.filter(function(ac){return ac.id===chosen.id;})[0];
      if(mc&&mc.fn){mc.fn(ps,me,st,addLog,{plotAssassin:function(){},bribe:function(){},forcedCoup:function(){},
        diplomacy:function(){
          // AI: 国庫が最も多い相手を選んで交換（自分に有利）
          var targets=ps.filter(function(p){return p.alive&&p!==me;});
          if(!targets.length)return;
          var partner=targets.reduce(function(a,b){return b.gold>a.gold?b:a;});
          var give=Math.floor(me.gold*0.3);
          var receive=Math.floor(partner.gold*0.3);
          me.gold=me.gold-give+receive;
          partner.gold=partner.gold-receive+give;
          addLog('🤝 '+me.name+'（AI）外交交渉 '+partner.name+'と国庫30%交換 ('+give+'↔'+receive+')','lai');
        }
      });}
      me.hand[chosenIdx]=Object.assign({},chosen,{used:true});
      setDur(cl(st.dur));addLog('🂠 '+me.name+'（AI）「'+chosen.name+'」をプレイ','lai');
      aiRunning.current=false;advanceAction(ps);
    },800);
    return function(){clearTimeout(timer);};
  },[phase,activeIdx]); // eslint-disable-line

  function playCard(){
    var me0=psRef.current[activeIdx];
    if(me0&&me0.bribed){var ps0=JSON.parse(JSON.stringify(psRef.current));ps0[activeIdx].bribed=false;setSelCard(null);advanceAction(ps0);return;}
    if(selCard===null)return;
    var ps=JSON.parse(JSON.stringify(psRef.current));
    var me=ps[activeIdx];
    var card=me.hand[selCard];
    if(!card||card.used)return;
    if(me.gold<card.cost){addLog('💰 国庫不足（コスト'+card.cost+'必要）','lcr');return;}
    me.gold=Math.max(0,me.gold-card.cost);
    var st={dur:durRef.current};
    var blocked=false;
    var cardActs={
      plotAssassin:function(){blocked=true;setAssassinData({byIdx:activeIdx,fromCard:true});},
      bribe:function(){blocked=true;setBribeTarget({byIdx:activeIdx});},
      forcedCoup:function(){blocked=true;setForcedCoupTarget({byIdx:activeIdx});},
      diplomacy:function(){blocked=true;setDiplomacyTarget({byIdx:activeIdx});},
    };
    var mc=ACTION_CARDS.filter(function(ac){return ac.id===card.id;})[0];
    if(mc&&mc.fn){mc.fn(ps,me,st,addLog,cardActs);}
    me.hand[selCard]=Object.assign({},card,{used:true});
    setDur(cl(st.dur));setSelCard(null);
    addLog('🂠 '+me.name+' 「'+card.name+'」をプレイ（コスト'+card.cost+'）','lp');
    callAI(me.name+'（'+me.emperor.name+'）がアクション「'+card.name+'」を実行した。ナレーションせよ。');
    if(!blocked){if(!checkCollapse(ps,cl(st.dur)))advanceAction(ps);}else{setPlayers(ps);}
  }

  function skipTurn(){
    var ps=JSON.parse(JSON.stringify(psRef.current));
    addLog('— '+ps[activeIdx].name+' 静観','lai');setSelCard(null);advanceAction(ps);
  }

  function executeCoup(targetIdx){
    var ps=JSON.parse(JSON.stringify(psRef.current));
    var usedIds=ps.filter(function(p){return p.alive;}).map(function(p){return p.emperor.id;});
    var pool=shuf(EMP.filter(function(e){return usedIds.indexOf(e.id)<0;}));var di=0;
    if(targetIdx!==undefined){
      var t=ps[targetIdx];if(t&&t.alive&&di<pool.length){t.emperor=Object.assign({},pool[di++]);t.ter=t.emperor.ter;}
      addLog('👑 '+t.name+' 強制的に皇帝交代 → '+t.emperor.name,'lev');
    }else{
      ps.forEach(function(p){
        if(!p.alive)return;
        if(p.emperor.id==='marcus'&&!p._marcusUsed){p._marcusUsed=true;addLog('📜 '+p.name+'（マルクス）政変を拒否！','lev');return;}
        if(p.coupImmune){p.coupImmune=false;addLog('📜 '+p.name+' 哲学研究で政変免疫！','lev');return;}
        if(di<pool.length){p.emperor=Object.assign({},pool[di++]);p.ter=p.emperor.ter;}
        addLog('🗡 '+p.name+' → '+p.emperor.name,'lev');
      });
    }
    setPlayers(ps);setCoupPending(false);setForcedCoupTarget(null);
    callAI('政変発生！全員が皇帝を引き直した。ナレーションせよ。');
    setTimeout(function(){setActiveIdx(0);setSelCard(null);setPhase('action');},1800);
  }

  function execAssassin(targetIdx){
    var ps=JSON.parse(JSON.stringify(psRef.current));
    var atk=ps[assassinData.byIdx];var def=ps[targetIdx];
    if(!def||!def.alive){setAssassinData(null);return;}
    var am=atk.emperor.mil+(atk.emperor.id==='nero'?4:0)+(atk.emperor.id==='commodus'?5:0)+(atk.legionBonus?3:0);
    if(atk.emperor.id==='constantine'){var mn=Math.min.apply(null,ps.filter(function(p){return p.alive;}).map(function(p){return p.gold;}));if(atk.gold<=mn)am+=6;}
    var dm=def.emperor.mil+(def.fortified?6:0)+(def.emperor.id==='tiberius'?4:0)-(def.emperor.id==='valerian'?3:0)+(def.emperor.id==='gordian3'?2:0);
    // 帝国耐久が低いほど混乱で暗殺成功率が上がる
    var durBonus=durRef.current<30?0.10:durRef.current<60?0.05:0;
    var sr=cl((am-dm)*.08+.5+durBonus,.1,.92);
    if(durBonus>0)addLog('⚠ 帝国の混乱により暗殺成功率+'+rnd(durBonus*100)+'%','lcr');
    addLog('🗡 暗殺判定: '+atk.name+'(攻撃'+am+') vs '+def.name+'(防御'+dm+') '+rnd(sr*100)+'%','lev');
    var success=Math.random()<sr;
    var loot=0;
    if(success){
      loot=assassinData.fromCard?Math.floor(def.gold*.4):Math.floor(def.gold*.5);
      atk.gold+=loot;def.gold-=loot;def.alive=false;def.skipTurns=1;def._needsRes=false;
      addLog('💀 暗殺成功！'+def.name+'（'+def.emperor.name+'）倒れた。国庫'+loot+'奪取！次ターン後復活。','ldth');
      if(def.emperor.id==='otho'){atk.gold=Math.max(0,atk.gold-5);addLog('👻 オトーの呪い！国庫-5','lcr');}
      callAI('暗殺成功！'+atk.emperor.name+'が'+def.emperor.name+'を葬った。ナレーションせよ。');
    }else{addLog('🛡 暗殺失敗！'+def.name+'（'+def.emperor.name+'）生存。','lp');}
    setAssassinScene({atk:atk.name,atkEm:atk.emperor.em,def:def.name,defEm:def.emperor.em,defEmpName:def.emperor.name,success:success,loot:loot});
    setPlayers(ps);setAssassinData(null);
    setTimeout(function(){setAssassinScene(null);},3000);
    if(!checkCollapse(ps,durRef.current))setTimeout(function(){setActiveIdx(0);setSelCard(null);setPhase('action');},3200);
  }

  function execPoison(){
    var ps=JSON.parse(JSON.stringify(psRef.current));
    var alive=ps.filter(function(p){return p.alive;});
    if(!alive.length){setPoisonPending(false);return;}
    var target=alive.reduce(function(a,b){return b.gold>a.gold?b:a;});
    var durBonusP=durRef.current<30?0.10:durRef.current<60?0.05:0;
    var sr=cl((7-target.emperor.mil+(target.fortified?-3:0))*.08+.45+durBonusP,.1,.90);
    if(Math.random()<sr){target.alive=false;target.skipTurns=1;target._needsRes=false;addLog('🧪 毒殺成功！'+target.name+'（'+target.emperor.name+'）倒れた。次ターン後復活。','ldth');
      setAssassinScene({atk:'毒殺者',atkEm:'🧪',def:target.name,defEm:target.emperor.em,defEmpName:target.emperor.name,success:true,loot:0});
      setTimeout(function(){setAssassinScene(null);},3000);
    }else{addLog('🧪 毒殺未遂。'+target.name+'（'+target.emperor.name+'）生存','lp');}
    setPlayers(ps);setPoisonPending(false);
    var ok=!checkCollapse(ps,durRef.current);
    if(ok)setTimeout(function(){setActiveIdx(0);setSelCard(null);setPhase('action');},3200);
  }

  function executeResurrection(pid){
    var ps=JSON.parse(JSON.stringify(psRef.current));
    var p=ps.find(function(x){return x.id===pid;});if(!p)return;
    var usedIds=ps.filter(function(x){return x.alive;}).map(function(x){return x.emperor.id;});
    var pool=shuf(EMP.filter(function(e){return usedIds.indexOf(e.id)<0;}));
    if(pool.length>0){p.emperor=Object.assign({},pool[0]);p.ter=pool[0].ter;}
    p.alive=true;p.skipTurns=0;p._needsRes=false;
    var dIdx=acIdxRef.current;p.hand=dealHand(dIdx);setAcIdx(dIdx+HAND);
    addLog('🌅 '+p.name+' が新皇帝「'+p.emperor.name+'」として復活した！','lev');
    callAI(p.name+'が新皇帝「'+p.emperor.name+'」として復活した。劇的にナレーションせよ。');
    var newQ=resurrectQ.filter(function(id){return id!==pid;});
    setResurrectQ(newQ);setPlayers(ps);
    if(newQ.length===0){setActiveIdx(0);setTimeout(function(){setPhase('event');},2200);}
  }

      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:3}},
        h('span',{style:{fontSize:10,color:'var(--tx2)'}},'🌿 帝国耐久'),
        h('span',{style:{fontSize:10,fontWeight:600,fontFamily:'Cinzel,serif',marginLeft:'auto'}},rnd(dur)+'%')
      ),
      h('div',{className:'swrap'},h('div',{className:'sbar',style:{width:durPct+'%',background:durColor}})),
      h('div',{style:{background:'rgba(196,43,21,.12)',border:'.5px solid rgba(196,43,21,.5)',borderRadius:6,padding:'5px 9px',marginTop:6,fontSize:10,color:'#FCA5A5',fontFamily:'Cinzel,serif',lineHeight:1.6}},
        dur<30?'🔴 危機！危機イベント率+60% / 暗殺成功率+10%':
        '🟡 警戒！危機イベント率+30% / 暗殺成功率+5%')
    ),
    // Narrative
    h(Narr,{text:narr,loading:narrLoad}),
    // Current event
    curEv?h('div',{className:'ev ev-'+curEv.type},
      h('div',{style:{display:'flex',gap:11,alignItems:'flex-start'}},
        h('span',{style:{fontSize:24,flexShrink:0}},curEv.em),
        h('div',{style:{flex:1}},
          h('div',{style:{fontSize:8,letterSpacing:2,fontFamily:'Cinzel,serif',textTransform:'uppercase',marginBottom:2,
            color:curEv.type==='crisis'?'#FCA5A5':curEv.type==='boon'?'#6EE7B7':curEv.type==='political'?'#C4B5FD':'#FDA4AF'}},
            curEv.type==='crisis'?'⚠ 危機イベント':curEv.type==='boon'?'✦ 恩恵イベント':curEv.type==='political'?'⚡ 政治イベント':'🗡 暗殺イベント'),
          h('div',{style:{fontFamily:'Cinzel Decorative,serif',fontSize:12,fontWeight:700,color:'var(--glt)',marginBottom:3}},curEv.name),
          h('div',{style:{fontSize:10,color:'var(--tx2)',fontFamily:'Cinzel,serif',lineHeight:1.5}},curEv.eff)
        )
      )
    ):null,
    // Players row
    h('div',{style:{display:'flex',gap:7,flexWrap:'wrap',marginBottom:8}},
      players.map(function(p,i){
        var isAct=i===activeIdx&&phase==='action';
        var cls='prow'+(isAct?' act':'')+(p.alive?'':(p.skipTurns&&p.skipTurns>0?' dead':' dead'));
        return h('div',{key:i,className:cls},

            ),

                color:P_COLORS[i%P_COLORS.length],overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},p.name),
              h('div',{style:{fontSize:8,color:'var(--tx3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},
                p.alive?p.emperor.name:p.skipTurns&&p.skipTurns>0?'一時退場中…':'暗殺済')
            ),

        h('div',{style:{fontSize:32,marginBottom:8}},'🗡'),
        h('div',{style:{fontFamily:'Cinzel Decorative,serif',fontSize:16,color:'#DDD6FE',marginBottom:6}},'政変！クーデター'),

          h('div',{style:{fontFamily:'IM Fell English,serif',fontStyle:'italic',fontSize:12,color:'var(--tx)',lineHeight:1.6}},'誰の次の手番を強制静観させるか選べ。')
        ),
        h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center',marginBottom:10}},

              onClick:function(){

                var me=ps[diplomacyTarget.byIdx];

                var g=Math.floor(me.gold*0.3);
                var r=Math.floor(partner.gold*0.3);
                me.gold=me.gold-g+r;

                addLog('🤝 '+me.name+' 外交交渉 '+partner.name+'と国庫30%交換 (渡す:'+g+' 受取:'+r+')','lp');
                setPlayers(ps);setDiplomacyTarget(null);

              h('div',{style:{fontSize:10,fontWeight:600,fontFamily:'Cinzel,serif',

    forcedCoupTarget?h('div',{className:'modal-bg'},

          h('div',{style:{fontFamily:'Cinzel Decorative,serif',fontSize:14,color:'#DDD6FE',marginBottom:4}},'宮廷クーデター'),
          h('div',{style:{fontFamily:'IM Fell English,serif',fontStyle:'italic',fontSize:12,color:'var(--tx)',lineHeight:1.6}},'誰の皇帝を強制的に引き直させるか選べ。')
        ),
        h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center',marginBottom:10}},
          players.map(function(p,i){

            return h('div',{key:i,onClick:function(){executeCoup(i);},
              style:{cursor:'pointer',border:'1.5px solid '+P_COLORS[i%P_COLORS.length],borderRadius:8,padding:'8px 11px',background:'var(--sf)',textAlign:'center',minWidth:90}},

          })

        h('div',{style:{textAlign:'center'}},
          h('button',{className:'btn-gh btn-sm',onClick:function(){setForcedCoupTarget(null);advanceAction(psRef.current);}},'キャンセル'))
      )
    ):null,
    // ASSASSIN SCENE OVERLAY
    assassinScene?h('div',{style:{position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:300,
      background:'rgba(0,0,0,.85)',
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'},className:'fu'},
      assassinScene.success?[0,1,2,3].map(function(i){
        return h('div',{key:i,style:{position:'absolute',top:0,left:(15+i*22)+'%',width:3,
          height:(50+i*15)+'px',background:'linear-gradient(180deg,#8B1A0A,transparent)',
          animation:'bloodA 1.5s '+(i*.15)+'s ease-in both',borderRadius:'0 0 4px 4px'}});
      }):null,
      h('div',{style:{textAlign:'center',padding:'0 20px'}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:16,marginBottom:16}},
          h('span',{style:{fontSize:40,filter:'drop-shadow(0 0 10px rgba(196,43,21,.8))'}},assassinScene.atkEm||'🗡'),
          h('span',{style:{fontSize:22,color:'#C42B15',fontFamily:'Cinzel,serif',letterSpacing:'.2em'}},'VS'),
          h('span',{style:{fontSize:40,filter:assassinScene.success?'grayscale(1)':'none',opacity:assassinScene.success?0.5:1}},

        h('div',{style:{fontFamily:'Cinzel Decorative,serif',fontSize:26,fontWeight:700,

        h('div',{style:{fontFamily:'IM Fell English,serif',fontStyle:'italic',fontSize:14,color:'rgba(242,237,228,.85)',marginBottom:8}},
          assassinScene.success
            ?assassinScene.atk+' が '+assassinScene.def+'（'+assassinScene.defEmpName+'）を葬った'

        assassinScene.success?h('div',{style:{marginTop:10,fontFamily:'IM Fell English,serif',fontStyle:'italic',fontSize:11,color:'rgba(242,237,228,.5)'}},'次のターン後に新皇帝として復活する…'):null
      )
    ):null,

    resurrectQ&&resurrectQ.length>0?h('div',{style:{position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:300,
      background:'rgba(0,0,0,.85)',
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'},className:'fu'},
      h('div',{style:{textAlign:'center',padding:'0 24px',position:'relative',zIndex:1}},
        h('div',{style:{fontSize:52,marginBottom:10,filter:'drop-shadow(0 0 16px rgba(201,168,76,.5))'},
          className:'pulseA'},'👑'),
        h('div',{style:{fontFamily:'Cinzel Decorative,serif',fontSize:22,fontWeight:700,
          color:'var(--glt)',letterSpacing:'.06em',marginBottom:6,
          textShadow:'0 0 30px rgba(201,168,76,.7)'}},'新皇帝の降臨'),
        h('div',{style:{fontFamily:'IM Fell English,serif',fontStyle:'italic',fontSize:14,
          color:'rgba(232,201,122,.8)',marginBottom:16,lineHeight:1.7}},
          h('span',{style:{color:'var(--glt)',fontStyle:'normal',fontFamily:'Cinzel,serif',fontSize:12}},

          color:'rgba(242,237,228,.6)',marginBottom:24}},'山から新たな皇帝カードを引き復活する'),
        h('button',{className:'btn',style:{fontSize:13,letterSpacing:'.15em',padding:'12px 32px'},
          onClick:function(){executeResurrection(resurrectQ[0]);}},
          '復活せよ — RESURREXI')
      )
    ):null
  );
}

// ─── END SCREEN ───
function EndScreen(props){
  var players=props.players,reason=props.reason,turn=props.turn,onRestart=props.onRestart,onTitle=props.onTitle;
  var isC=reason==='collapse', isS=reason==='survivor';
  var sorted=players.slice().sort(function(a,b){return b.gold-a.gold;});
  var winner=sorted[0];
  return h('div',{style:{minHeight:440,display:'flex',alignItems:'center',justifyContent:'center',
    borderRadius:12,margin:'8px 0',
    background:'radial-gradient(ellipse at center,rgba(74,56,16,.15) 0%,rgba(26,16,8,.6) 100%)'}},
    h('div',{className:'panel fu',style:{border:'2px solid var(--b2)',maxWidth:440,width:'100%',
      margin:12,textAlign:'center',background:'#FFFBF0'}},
      h('div',{style:{fontSize:48,marginBottom:8,filter:'drop-shadow(0 0 12px rgba(201,168,76,.4))'}},
        isC?'💀':isS?'⚔':'🏛'),
      h('div',{style:{fontFamily:'Cinzel Decorative,serif',fontSize:20,fontWeight:700,marginBottom:4,
        color:isC?'#FCA5A5':isS?'#FCD34D':'var(--glt)'}},
        isC?'ROMA CADIT':isS?'VICTOR SOLITARIUS':'DIVISIO IMPERII'),
      h('div',{style:{fontFamily:'IM Fell English,serif',fontStyle:'italic',fontSize:13,
        color:'var(--gmd)',marginBottom:'1rem'}},
        isC?'帝国は滅亡した——全員敗北':isS?'最後の生存者が帝国を支配した':
        'AD395年、東西分裂。国庫最多者の勝利（ターン'+turn+'）'),
      !isC&&winner?h('div',{style:{background:'rgba(201,168,76,.08)',border:'1px solid var(--b2)',
        borderRadius:8,padding:'10px 14px',marginBottom:'1rem'}},
        h('div',{style:{fontSize:9,letterSpacing:2,color:'var(--gmd)',textTransform:'uppercase',
          fontFamily:'Cinzel,serif',marginBottom:4}},'勝者'),
        h('div',{style:{fontSize:28,marginBottom:3,filter:'drop-shadow(0 0 8px rgba(201,168,76,.4))'}},
          winner.emperor?winner.emperor.em:'👑'),
        h('div',{style:{fontFamily:'Cinzel Decorative,serif',fontSize:16,color:'var(--glt)',marginBottom:2}},winner.name),
        h('div',{style:{fontFamily:'IM Fell English,serif',fontStyle:'italic',fontSize:12,color:'var(--gmd)'}},
          (winner.emperor?winner.emperor.name:''),' — 💰 '+rnd(winner.gold)+' 国庫')
      ):null,
      isC?h('div',{style:{fontFamily:'IM Fell English,serif',fontStyle:'italic',fontSize:13,
        color:'#FCA5A5',marginBottom:'1rem',lineHeight:1.7}},
        'Sic transit gloria mundi.',h('br'),
        '私利を優先した末、帝国は歴史の彼方に消えた。'):null,
      h('div',{style:{marginBottom:'1rem',textAlign:'left'}},
        sorted.map(function(p,r){
          return h('div',{key:p.id,style:{display:'flex',alignItems:'center',padding:'7px 0',
            borderBottom:'.5px solid rgba(201,168,76,.15)',gap:8}},
            h('span',{style:{fontSize:14,width:22,flexShrink:0}},r===0&&!isC?'🏆':''),
            h('div',{style:{width:24,height:24,borderRadius:'50%',
              background:P_COLORS[p.id%P_COLORS.length]+'22',
              border:'1px solid '+P_COLORS[p.id%P_COLORS.length]+'55',
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,flexShrink:0}},
              p.alive&&p.emperor?p.emperor.em:'💀'),
            h('div',{style:{flex:1,minWidth:0}},
              h('div',{style:{fontSize:10,fontFamily:'Cinzel,serif',fontWeight:600,
                color:P_COLORS[p.id%P_COLORS.length]}},p.name),
              h('div',{style:{fontSize:8,color:'var(--tx3)'}},
                p.alive&&p.emperor?p.emperor.name:'暗殺済',' · 領土'+p.ter)
            ),
            h('span',{className:'pill pg',style:{flexShrink:0}},'💰 '+rnd(p.gold))
          );
        })
      ),
      h('div',{style:{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}},
        h('button',{className:'btn',onClick:onRestart},'再プレイ'),
        h('button',{className:'btn-gh',onClick:onTitle},'タイトルへ')
      )
    )
  );
}

// ─── APP ───
function App(){
  var sa=useState('title'); var screen=sa[0]; var setScreen=sa[1];
  var sb=useState(null); var initP=sb[0]; var setInitP=sb[1];
  var sc=useState(2); var np=sc[0]; var setNp=sc[1];

  function startGame(n){
    var deck=shuf(EMP);
    var players=[];
    for(var i=0;i<n;i++){
      players.push({
        id:i, name:i===0?'あなた':'プレーヤー'+(i+1),
        isHuman:i===0,
        emperor:Object.assign({},deck[i]),
        gold:20, ter:deck[i].ter,
        alive:true, fortified:false, senateBlock:false,
        _marcusUsed:false, skipTurns:0, hand:[]
      });
    }
    setInitP(players); setNp(n); setScreen('game');
  }

  return h('div',{style:{maxWidth:700,margin:'0 auto',padding:'0 .5rem',minHeight:'100vh'}},
    h('div',{style:{textAlign:'center',padding:'10px 0 8px',
      borderBottom:'1px solid rgba(201,168,76,.3)',marginBottom:10,
      background:'#FFFBF0',position:'relative'}},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:14}},
        h('span',{style:{fontSize:14,filter:'drop-shadow(0 0 5px rgba(255,160,50,.6))'}}, '🔥'),
        h('span',{style:{fontSize:9,letterSpacing:'.35em',color:'var(--gold)',fontFamily:'Cinzel,serif',
          textShadow:'0 0 10px rgba(201,168,76,.4)'}},
          '✦ IMPERIUM SENATUS · '+EMP.length+'人の皇帝 · BC27–AD395 ✦  [ JP ]'),
        h('span',{style:{fontSize:14,filter:'drop-shadow(0 0 5px rgba(255,160,50,.6))'}}, '🔥')
      )
    ),
    screen==='title'?h(TitleScreen,{onStart:startGame,onCatalog:function(){setScreen('catalog');}}):null,
    screen==='catalog'?h(CatalogScreen,{onBack:function(){setScreen('title');}}):null,
    screen==='game'&&initP?h(GameScreen,{init:initP,numP:np,onEnd:function(a){
      if(a==='restart')startGame(np); else setScreen('title');
    }}):null
  );
}

// ─── MOUNT ───
var container = document.getElementById('root');
var appRoot = ReactDOM.createRoot(container);
appRoot.render(h(App));
</script>
